# ── Input: Receive from Filebeat ─────────────────────────────────────────────
input {
  beats {
    port => 5044
  }
}

# ── Filter: Parse & Enrich Logs ──────────────────────────────────────────────
filter {

  # ── Nginx access log (JSON format) ────────────────────────────────────────
  if [container][name] =~ "nginx" or [fields][service] == "nginx" {
    json {
      source => "message"
      target => "nginx"
      skip_on_invalid_json => true
    }

    if [nginx][status] {
      mutate {
        convert => { "[nginx][status]" => "integer" }
        convert => { "[nginx][body_bytes]" => "integer" }
        convert => { "[nginx][request_time]" => "float" }
        add_tag => ["nginx_access"]
      }
    }
  }

  # ── Backend (Go/Echo) logs ────────────────────────────────────────────────
  if [container][name] =~ "backend" or [fields][service] == "backend" {
    json {
      source  => "message"
      target  => "go"
      skip_on_invalid_json => true
    }

    mutate {
      add_tag => ["go_backend"]
    }

    # Parse Echo's default log format if not JSON
    if ![go][level] {
      grok {
        match => {
          "message" => [
            "%{TIMESTAMP_ISO8601:go.time}\s+%{LOGLEVEL:go.level}\s+%{GREEDYDATA:go.message}"
          ]
        }
        tag_on_failure => ["_grok_failure_backend"]
      }
    }
  }

  # ── Frontend (Next.js) logs ────────────────────────────────────────────────
  if [container][name] =~ "frontend" or [fields][service] == "frontend" {
    mutate { add_tag => ["nextjs_frontend"] }
  }

  # ── MySQL logs ────────────────────────────────────────────────────────────
  if [container][name] =~ "mysql" {
    mutate { add_tag => ["mysql"] }
  }

  # ── Redis logs ────────────────────────────────────────────────────────────
  if [container][name] =~ "redis" {
    mutate { add_tag => ["redis"] }
  }

  # ── Common enrichment ─────────────────────────────────────────────────────
  mutate {
    add_field => { "[@metadata][index]" => "jurnal-logs-%{+YYYY.MM.dd}" }
  }

  # Parse timestamp if available
  if [nginx][time] {
    date {
      match  => ["[nginx][time]", "ISO8601"]
      target => "@timestamp"
    }
  }
}

# ── Output: Elasticsearch ─────────────────────────────────────────────────────
output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "jurnal-logs-%{+YYYY.MM.dd}"
    ilm_enabled       => false
    template_overwrite => false
  }

  # Uncomment for debugging:
  # stdout { codec => rubydebug }
}
