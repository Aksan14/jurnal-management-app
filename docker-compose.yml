name: jurnal-apps

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service"

x-restart: &always-restart
  restart: unless-stopped

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
  elk-network:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mysql-data:
  redis-data:
  es-data:
  logstash-data:
  nginx-logs:

# ── Services ─────────────────────────────────────────────────────────────────
services:

  # ── 1. MySQL 8 ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    <<: *always-restart
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    logging: *default-logging

  # ── 2. Redis 7 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *always-restart
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── 3. Backend (Go/Echo) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    <<: *always-restart
    environment:
      APP_ENV:           ${APP_ENV:-production}
      PORT:              8080
      DB_HOST:           mysql
      DB_PORT:           3306
      DB_USER:           ${DB_USER}
      DB_PASSWORD:       ${DB_PASSWORD}
      DB_NAME:           ${DB_NAME}
      JWT_SECRET:        ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_ADDR:        redis:6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD}
      REDIS_DB:          0
      SMTP_HOST:         ${SMTP_HOST}
      SMTP_PORT:         ${SMTP_PORT}
      SMTP_USER:         ${SMTP_USER}
      SMTP_PASS:         ${SMTP_PASS}
      APP_URL:           ${APP_URL:-http://localhost}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
    labels:
      service: "backend"

  # ── 4. Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    <<: *always-restart
    environment:
      NODE_ENV:              production
      NEXT_PUBLIC_API_URL:   ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 -S 2>&1 | grep -q '200 OK' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    labels:
      service: "frontend"

  # ── 5. Nginx (Load Balancer / Reverse Proxy) ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    <<: *always-restart
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging
    labels:
      service: "nginx"

  # ─────────────────────────────────────────────────────────────────────────
  # ELK STACK  —  Monitoring & Logging
  # ─────────────────────────────────────────────────────────────────────────

  # ── 6. Elasticsearch ───────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    <<: *always-restart
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - cluster.name=jurnal-cluster
      - node.name=es-node-1
    volumes:
      - es-data:/usr/share/elasticsearch/data
      - ./elk/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks:
      - elk-network
    healthcheck:
      test: ["CMD-SHELL",
             "curl -fs http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging

  # ── 7. Logstash ────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.0
    <<: *always-restart
    environment:
      - LS_JAVA_OPTS=-Xmx256m -Xms256m
      - xpack.monitoring.elasticsearch.hosts=http://elasticsearch:9200
      - xpack.monitoring.enabled=true
    volumes:
      - ./elk/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - logstash-data:/usr/share/logstash/data
    ports:
      - "5044:5044"   # Beats input
      - "9600:9600"   # Logstash API
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-network
    logging: *default-logging

  # ── 8. Kibana ──────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.0
    <<: *always-restart
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=jurnal-kibana
      - TELEMETRY_ENABLED=false
    volumes:
      - ./elk/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"   # Kibana UI → http://localhost:5601
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-network
    logging: *default-logging

  # ── 9. Filebeat (Log Shipper) ──────────────────────────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.0
    <<: *always-restart
    user: root
    command: filebeat -e -strict.perms=false
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx-logs:/var/log/nginx:ro
    depends_on:
      logstash:
        condition: service_started
    networks:
      - app-network
      - elk-network
    logging: *default-logging
