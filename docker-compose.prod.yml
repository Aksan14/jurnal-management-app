name: jurnal-apps

services:

  # ── Backend: 3 replicas  ──────────────────────────────────────────────────
  # Horizontal: 3 instances behind nginx
  # Vertical:   1 CPU / 512 MB RAM per instance
  backend:
    deploy:
      replicas: 3                           # ← Horizontal Scaling
      resources:
        limits:                             # ← Vertical Scaling (max)
          cpus: "1.0"
          memory: 512M
        reservations:                       # ← Guaranteed minimum
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1                      # roll one at a time
        delay: 10s
        failure_action: rollback
        order: start-first                  # zero-downtime rolling deploy
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first

  # ── Frontend: 2 replicas ──────────────────────────────────────────────────
  frontend:
    deploy:
      replicas: 2                           # ← Horizontal Scaling
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first

  # ── Nginx: single instance (scale manually if needed) ─────────────────────
  nginx:
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── MySQL: single instance (use Galera/RDS for HA) ─────────────────────────
  mysql:
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"                       # ← Vertical Scaling: 2 CPU cores
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Redis: single instance (use Redis Cluster for HA) ──────────────────────
  redis:
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    environment:
      - ES_JAVA_OPTS=-Xms1g -Xmx1g       # ← increase heap for production
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          cpus: "1.0"
          memory: 2G
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Logstash ──────────────────────────────────────────────────────────────
  logstash:
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Kibana ────────────────────────────────────────────────────────────────
  kibana:
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Filebeat ──────────────────────────────────────────────────────────────
  filebeat:
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Metricbeat (vCPU/RAM metrics per container) ────────────────────────────
  metricbeat:
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
      restart_policy:
        condition: on-failure
        max_attempts: 3
